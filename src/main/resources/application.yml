server:
  port: 9000

# Invoice generation async (POST → after-commit job); set DEBUG for more detail.
logging:
  level:
    io.clubone.billing.service.InvoiceGenerationService: INFO
    io.clubone.billing.service.invoicegen: INFO
    io.clubone.billing.repo.InvoiceGenerationRepository: INFO

spring:
  application:
    name: clubone-billing-batch
  threads:
    virtual:
      enabled: true

  datasource:
    clubone:
      url: jdbc:postgresql://clubone-free-tier-db.cju8eqswasju.us-east-1.rds.amazonaws.com:5432/clubone_dev
      username: clubone_dev_user
      password: C1ub0ne@2024!
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 20
        minimum-idle: 4
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        leak-detection-threshold: 60000

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
      table-prefix: batch_job_logs.batch_

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: clubone-billing-batch
  prometheus:
    metrics:
      export:
        enabled: true

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      paymentService:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

clubone:
  billing:
    chunk-size: 300

    async:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 8

    charge:
      invoice-page-size: 500

    prevent-duplicate-across-runs: true
    use-row-locking: false

    update-invoice: false
    update-schedule: true

    mock-charge:
      skip-currency-check: true
      skip-mandate-max-amount-check: false

    payment:
      strategy: HTTP
      http:
        base-url: https://develop-api.clubone.io
        create-and-capture-path: /api/payments/capture-invoice
        timeout-ms: 8000
        test-mode:
          enabled: false
          fail-attempts: 2
          exception-type: SOCKET_TIMEOUT

    noop:
      outcome: SUCCESS

    scheduling:
      enabled: false
      cron: "0 0 2 * * ?"

  crm:
    completion-link-base: ""

  notification:
    base-url: https://develop-api.clubone.io
    actor-user-id: 11111111-1111-1111-1111-111111111111

aws:
