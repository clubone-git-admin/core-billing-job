server:
  port: 9000
  # Cap HTTP concurrency for 0.5–1 vCPU ECS tasks (default Tomcat is far too large).
  tomcat:
    threads:
      max: 10
      min-spare: 2
    accept-count: 25
    max-connections: 50

# Invoice generation async (POST → after-commit job); set DEBUG for more detail.
logging:
  level:
    io.clubone.billing.service.InvoiceGenerationService: INFO
    io.clubone.billing.service.invoicegen: INFO
    io.clubone.billing.repo.InvoiceGenerationRepository: INFO
    io.clubone.billing.batch.payment.HttpPaymentService: WARN

spring:
  application:
    name: clubone-billing-batch
  # Platform threads on tiny tasks — virtual threads + Tomcat amplify CPU throttling.
  threads:
    virtual:
      enabled: false

  datasource:
    clubone:
      url: jdbc:postgresql://clubone-free-tier-db.cju8eqswasju.us-east-1.rds.amazonaws.com:5432/clubone_dev
      username: clubone_dev_user
      password: C1ub0ne@2024!
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: 5
        minimum-idle: 1
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        leak-detection-threshold: 60000

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never
      table-prefix: batch_job_logs.batch_

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: clubone-billing-batch
  prometheus:
    metrics:
      export:
        enabled: true

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        registerHealthIndicator: true
        slidingWindowSize: 50
        minimumNumberOfCalls: 20
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      paymentService:
        maxAttempts: 2
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

clubone:
  billing:
    # Smaller chunks keep GC/CPU quieter on 0.5 vCPU while preserving outcomes.
    chunk-size: 50
    reader-page-size: 50

    async:
      core-pool-size: 1
      max-pool-size: 2
      queue-capacity: 16

    charge:
      invoice-page-size: 50

    actual-charge:
      pending:
        poll:
          enabled: true
          # Background only — keep light on tiny ECS tasks.
          fixed-delay-ms: 300000
          batch-size: 20
          stale-minutes: 2

    rate-limit:
      # 8/s saturates 0.5–1 vCPU with HTTP capture + retries; pace captures instead.
      payment-per-second: 2

    prevent-duplicate-across-runs: true
    use-row-locking: false

    update-invoice: false
    update-schedule: true

    mock-charge:
      skip-currency-check: true
      skip-mandate-max-amount-check: false
      invoice-page-size: 50

    payment:
      strategy: HTTP
      http:
        base-url: https://develop-api.clubone.io
        create-and-capture-path: /api/payments/capture-invoice
        timeout-ms: 8000
        test-mode:
          enabled: false
          fail-attempts: 2
          exception-type: SOCKET_TIMEOUT

    noop:
      outcome: SUCCESS

    scheduling:
      enabled: false
      cron: "0 0 2 * * ?"

  crm:
    completion-link-base: ""

  notification:
    base-url: https://develop-api.clubone.io
    actor-user-id: 11111111-1111-1111-1111-111111111111

